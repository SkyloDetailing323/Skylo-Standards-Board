[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

[functions."hcp-upsell-sync"]
  schedule = "*/5 * * * *"

[functions."hcp-backfill"]
  timeout = 26

[functions."hcp-backfill-background"]
  # Background function — runs up to 15 min, no timeout issues
